version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: efita_backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    environment:
      # O banco será salvo no volume nomeado do docker, na pasta /app/data internamente
      - DATABASE_URL=sqlite:////app/data/efita.db
      # Permite requisições do frontend exposto na porta 8080
      - FRONTEND_ORIGIN=http://localhost:8080
    # Carrega variáveis sensíveis do arquivo .env local, se existir
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: efita_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  # Volume nomeado para persistir o banco de dados SQLite
  backend_data:

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar Inscrição | EFITA</title>
  <link rel="stylesheet" href="./styles/global.css" />
  <link rel="stylesheet" href="./styles/forms.css" />
  <style>
    .consulta-container {
      max-width: 500px;
      margin: 4rem auto;
    }
    .status-card {
      margin-top: 2rem;
      border-top: 4px solid var(--primary);
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border-color);
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .status-label {
      color: var(--text-muted);
      font-weight: 500;
    }
    .status-value {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="consulta-container">
      <div class="text-center mb-4">
        <h1 style="color: var(--primary)">Consultar Inscrição</h1>
        <p style="color: var(--text-muted)">Acompanhe o status da sua inscrição no EFITA</p>
      </div>

      <div class="card">
        <form id="consulta-form">
          <div class="form-group">
            <label class="form-label" for="cpf">CPF</label>
            <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" required>
          </div>
          <button type="submit" class="btn btn-primary w-full" id="submit-btn">Consultar</button>
          <div id="form-error" class="error-message text-center mt-2"></div>
        </form>
      </div>

      <div class="card status-card hidden" id="result-card">
        <h3 class="mb-3 text-center" id="res-nome"></h3>
        
        <div class="status-item">
          <span class="status-label">Protocolo</span>
          <span class="status-value" id="res-protocolo" style="color: var(--primary);"></span>
        </div>
        
        <div class="status-item">
          <span class="status-label">Status da Inscrição</span>
          <span class="status-value" id="res-status-inscricao"></span>
        </div>
        
        <div class="status-item">
          <span class="status-label">Status do Pagamento</span>
          <span class="status-value" id="res-status-pagamento"></span>
        </div>
        
        <div class="status-item">
          <span class="status-label">Pôster Submetido</span>
          <span class="status-value" id="res-poster"></span>
        </div>

        <div class="status-item hidden" id="poster-status-container">
          <span class="status-label">Status do Pôster</span>
          <span class="status-value" id="res-status-poster"></span>
        </div>

        <div class="mt-4 text-center">
          <button class="btn btn-outline w-full" onclick="window.print()">Imprimir</button>
        </div>
      </div>
      
      <div class="text-center mt-4">
        <a href="/">Voltar para a Inscrição</a>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/api.js"></script>
  <script type="module" src="/src/consulta.js"></script>
</body>
</html>

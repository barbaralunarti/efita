<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | EFITA</title>
  <link rel="stylesheet" href="../styles/global.css" />
  <link rel="stylesheet" href="../styles/forms.css" />
  <style>
    .login-container {
      max-width: 400px;
      margin: 10vh auto;
    }
    .admin-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      color: var(--primary);
      text-align: center;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-container">
      <div class="admin-logo">EFITA Admin</div>
      <div class="card">
        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="username">Usuário</label>
            <input type="text" id="username" class="form-control" required>
          </div>
          <div class="form-group mb-4">
            <label class="form-label" for="password">Senha</label>
            <input type="password" id="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-full" id="submit-btn">Entrar</button>
          <div id="form-error" class="error-message text-center mt-3"></div>
        </form>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/api.js"></script>
  <script type="module" src="/src/admin/auth.js"></script>
</body>
</html>
